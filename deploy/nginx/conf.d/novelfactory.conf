# ──────────────────────────────────────────────────────────────────────────────
# NovelFactory — Nginx Server Configuration
#
# Upstream: api service (container name = nf_api)
# Routes:
#   /           → redirect to /api/v1 (discovery)
#   /health     → nginx status (no proxy, local only)
#   /api/       → NovelFactory FastAPI (upstream: 172.28.0.0/16)
# ──────────────────────────────────────────────────────────────────────────────

upstream novelfactory_api {
    # NovelFactory FastAPI listens on 8000 (uvicorn) inside the api container
    # (see Dockerfile CMD). Previously this was 2024 (LangGraph Platform default).
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Security Headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; frame-ancestors 'none';"       always;

    # ── Root redirect ─────────────────────────────────────────────────────────
    location = / {
        return 302 /api/v1;
    }

    # ── Health check (nginx self-check, no proxy) ─────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        # Rate limiting
        limit_req  zone=api_limit burst=50 nodelay;
        limit_conn addr 20;

        # Strip /api/ prefix when proxying to FastAPI upstream.
        # FastAPI defines routes as bare paths (/health, /ready, /threads/...),
        # so the trailing slash in proxy_pass is essential to strip the prefix.
        proxy_pass         http://novelfactory_api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-ID     $request_id;

        # Connection keepalive to upstream
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    900s;    # Long-running chapter generation (对齐 LLM_REQUEST_TIMEOUT)

        # SSE / Streaming support
        proxy_buffering            off;
        proxy_cache               off;
        chunked_transfer_encoding on;

        # Error handling
        proxy_intercept_errors    on;
        error_page 502 503 504 = @fallback;
    }

    # ── Fallback for upstream errors ──────────────────────────────────────────
    location @fallback {
        default_type application/json;
        return 503 '{"error":"upstream_unavailable","message":"API暂时不可用，请稍后重试"}';
    }

    # ── Static assets (if served separately) ─────────────────────────────────
    # location /static/ {
    #     alias /var/www/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ── Deny access to hidden files ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

