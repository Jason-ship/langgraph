user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;  # 隐藏 nginx 版本号，减少信息泄露

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main  buffer=16k flush=5s;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # ── Request limits ──────────────────────────────────────────────────────────
    client_max_body_size      10M;    # Max upload size
    client_body_buffer_size  128k;
    proxy_buffer_size         128k;
    # proxy_buffers: 8 buffers × 128k. proxy_busy_buffers_size must
    # satisfy TWO constraints:
    #   1) >= max(proxy_buffer_size, single proxy_buffer) = 128k
    #   2) < (n_buffers × proxy_buffer_size) = 8 × 128k = 1024k
    # We pick 128k: meets the lower bound exactly, well under the upper.
    proxy_buffers             8 128k;
    proxy_busy_buffers_size   128k;
    proxy_connect_timeout     30s;
    proxy_send_timeout        60s;
    proxy_read_timeout        60s;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss;

    # ── Rate limiting zones ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Include server-level configs
    include /etc/nginx/conf.d/*.conf;
}

